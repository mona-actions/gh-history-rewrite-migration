name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install git filter-repo
        run: |
          sudo apt-get update
          sudo apt-get install -y git-filter-repo

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # We intentionally do NOT pass -race because the upstream pterm
      # spinner library has a benign internal data race that the detector
      # flags. The race is not in our code; running with -race today would
      # only produce noise. Re-enable once pterm fixes it (or the spinner
      # is replaced).
      - name: go test
        run: go test ./...
